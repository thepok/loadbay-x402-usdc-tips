<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tip with USDC (x402)</title>
  <style>
    .x402-tips {
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 16px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #f6f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f2328;
      max-width: 360px;
    }
    .x402-tips button {
      cursor: pointer;
      background: #1f883d;
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
    }
    .x402-tips button:disabled {
      background: #8c959f;
      cursor: not-allowed;
    }
    .x402-tips .x402-status {
      font-size: 12px;
      color: #57606a;
      min-height: 16px;
    }
    .x402-tips .x402-payto {
      font-size: 11px;
      color: #57606a;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="x402-tips"
     data-base-url="https://65.108.95.149"
     data-endpoint="/x402/health"
     data-amount-usdc="0.001"
     data-pay-to="0x302d13d6a1feE0b32eDf8B76786354cd69426fD7"
     data-network="eip155:8453"
     data-asset="0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
     data-facilitator="https://facilitator.payai.network">
  <button type="button">Tip 0.001 USDC on Base</button>
  <div class="x402-status">Ready.</div>
  <div class="x402-payto">payout: 0x302d13d6a1feE0b32eDf8B76786354cd69426fD7</div>
</div>

<script src="tips-widget.js"></script>
</body>
</html>
